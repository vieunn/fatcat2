<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lavenders for You</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --night: #07111e;
            --mist: rgba(169, 131, 255, 0.12);
            --stem: #7bb58a;
            --leaf: #63a36f;
            --lavender-dark: #6c4bd9;
            --lavender-mid: #a575ff;
            --lavender-light: #d6c2ff;
            --lavender-glow: rgba(166, 122, 255, 0.42);
            --soil: #0d1825;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            display: grid;
            place-items: end center;
            background:
                radial-gradient(circle at 50% 20%, rgba(112, 80, 226, 0.18), transparent 28%),
                radial-gradient(circle at 20% 10%, rgba(88, 173, 255, 0.1), transparent 18%),
                linear-gradient(to top, var(--soil) 0%, #09111d 28%, var(--night) 100%);
            font-family: Arial, sans-serif;
        }

        .night {
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 12% 18%, rgba(130, 220, 255, 0.18) 0 0.15vmin, transparent 0.3vmin),
                radial-gradient(circle at 28% 8%, rgba(190, 150, 255, 0.16) 0 0.15vmin, transparent 0.3vmin),
                radial-gradient(circle at 48% 24%, rgba(190, 150, 255, 0.18) 0 0.18vmin, transparent 0.35vmin),
                radial-gradient(circle at 68% 14%, rgba(130, 220, 255, 0.15) 0 0.12vmin, transparent 0.28vmin),
                radial-gradient(circle at 82% 30%, rgba(190, 150, 255, 0.14) 0 0.16vmin, transparent 0.32vmin),
                radial-gradient(circle at 18% 36%, rgba(130, 220, 255, 0.12) 0 0.12vmin, transparent 0.28vmin),
                radial-gradient(circle at 90% 18%, rgba(130, 220, 255, 0.12) 0 0.12vmin, transparent 0.28vmin),
                radial-gradient(circle at 38% 46%, rgba(190, 150, 255, 0.12) 0 0.12vmin, transparent 0.28vmin);
            opacity: 0.9;
            filter: blur(0.15vmin);
            pointer-events: none;
        }

        .scene {
            position: relative;
            width: min(100vw, 1100px);
            height: min(100vh, 900px);
            transform: scale(0.95);
        }

        .ground {
            position: absolute;
            left: 0;
            right: 0;
            bottom: -2vmin;
            height: 28vmin;
            background: linear-gradient(to top, rgba(10, 20, 31, 0.95), rgba(10, 20, 31, 0.1));
            filter: blur(0.4vmin);
        }

        .fireflies {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            mix-blend-mode: screen;
        }

        .firefly {
            position: absolute;
            left: var(--x, 50%);
            top: var(--y, 50%);
            width: 0.65vmin;
            height: 0.65vmin;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 170, 0.96) 0%, rgba(255, 221, 90, 0.42) 40%, rgba(255, 221, 90, 0) 70%);
            box-shadow: 0 0 1.75vmin rgba(255, 215, 120, 0.65);
            transform: translate(-50%, -50%) translateX(0) translateY(0) scale(0.8);
            opacity: 0;
            animation:
                firefly-glow var(--d, 4.5s) ease-in-out infinite var(--delay, 0s),
                firefly-drift calc(var(--d, 4.5s) * 2) ease-in-out infinite var(--delay, 0s);
        }

        .sprig {
            position: absolute;
            bottom: 8vmin;
            width: 14vmin;
            height: var(--sprig-height, 58vmin);
            transform-origin: bottom center;
            animation: sway 5.5s ease-in-out infinite;
        }

        .sprig::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: 0;
            transform: translateX(-50%);
            width: 9vmin;
            height: 28vmin;
            background: radial-gradient(circle at 50% 0%, rgba(173, 94, 255, 0.22), transparent 60%);
            filter: blur(1.8vmin);
            z-index: 1;
            pointer-events: none;
        }

        .sprig--1 { left: 10%; transform: rotate(-4deg); animation-duration: 5.2s; }
        .sprig--2 { left: 26%; transform: rotate(1deg); animation-duration: 5.8s; }
        .sprig--3 { left: 41%; transform: rotate(-2deg); animation-duration: 6.1s; }
        .sprig--4 { left: 56%; transform: rotate(3deg); animation-duration: 5.4s; }
        .sprig--5 { left: 72%; transform: rotate(-1deg); animation-duration: 6s; }
        .sprig--6 { left: 86%; transform: rotate(2deg); animation-duration: 5.6s; }
        .sprig--7 { left: 4%; transform: rotate(-6deg); animation-duration: 5.7s; }
        .sprig--8 { left: 92%; transform: rotate(5deg); animation-duration: 5.7s; }
        .sprig--9 { left: 18%; transform: rotate(-2deg); animation-duration: 5.4s; }
        .sprig--10 { left: 34%; transform: rotate(2deg); animation-duration: 5.9s; }
        .sprig--11 { left: 62%; transform: rotate(-3deg); animation-duration: 5.6s; }
        .sprig--12 { left: 78%; transform: rotate(1deg); animation-duration: 5.8s; }

        .stem {
            position: absolute;
            left: 50%;
            bottom: 0;
            transform: translateX(-50%) scaleY(1);
            width: 1.15vmin;
            height: 100%;
            transform-origin: bottom center;
            border-radius: 999px;
            background: linear-gradient(to right, rgba(255,255,255,0.08), rgba(255,255,255,0.02) 22%, rgba(0,0,0,0.25) 45%), linear-gradient(to top, #4f7e5c, var(--stem) 45%, #95c48c);
            box-shadow: 0 0 2.5vmin rgba(123, 181, 138, 0.2);
            animation: grow 3.8s ease-out backwards;
            z-index: 2;
        }

        .stem::before,
        .stem::after {
            content: "";
            position: absolute;
            width: 8vmin;
            height: 4.5vmin;
            border-top-left-radius: 100% 100%;
            border-top-right-radius: 100% 100%;
            border-bottom-left-radius: 80% 100%;
            background: linear-gradient(to top, rgba(80, 132, 92, 0.15), rgba(99, 163, 111, 0.95));
            filter: saturate(1.1);
            opacity: 0.9;
        }

        .stem::before {
            left: 0.4vmin;
            top: 26vmin;
            transform: rotate(22deg);
            transform-origin: left center;
        }

        .stem::after {
            right: 0.2vmin;
            top: 38vmin;
            transform: rotate(-18deg);
            transform-origin: right center;
        }

        .panicle {
            position: absolute;
            left: 50%;
            top: -2vmin;
            transform: translateX(-50%);
            width: 13vmin;
            height: 36vmin;
            z-index: 4;
            animation: bloom 1.8s ease-out backwards;
        }

        .panicle::before {
            content: "";
            position: absolute;
            left: 50%;
            top: 42%;
            transform: translate(-50%, -50%);
            width: 14vmin;
            height: 32vmin;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(214, 194, 255, 0.94), rgba(214, 194, 255, 0.3) 48%, transparent 72%);
            filter: blur(2vmin);
            opacity: 0.9;
            pointer-events: none;
        }

        .panicle::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 22%;
            transform: translate(-50%, -35%);
            width: 8vmin;
            height: 8vmin;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(223, 169, 255, 0.85), rgba(136, 72, 255, 0.16) 60%, transparent 82%);
            filter: blur(0.9vmin);
            z-index: 5;
            pointer-events: none;
            animation: bloomGlow 4.2s ease-in-out infinite;
        }

        .flower-top {
            position: absolute;
            left: 50%;
            top: -1.6vmin;
            transform: translateX(-50%);
            width: 5.5vmin;
            height: 5.5vmin;
            border-radius: 50%;
            background: radial-gradient(circle, #fff8ff 0 16%, #e3d7ff 20%, #b088ff 38%, #7a52df 68%, #5630b2 100%);
            box-shadow: 0 0 3vmin rgba(166, 122, 255, 0.55);
            z-index: 3;
        }

        .bud {
            position: absolute;
            left: 50%;
            top: var(--y, 0%);
            width: var(--w, 1.05vmin);
            height: var(--h, 2.3vmin);
            border-radius: 999px;
            background: linear-gradient(to bottom, #f2e6ff, #b491ff 38%, #6440c2 100%);
            box-shadow: 0 0 1.25vmin rgba(170, 100, 255, 0.24);
            transform: translateX(-50%) rotate(var(--r, 0deg));
            transform-origin: center bottom;
        }

        .bud.cluster {
            width: 1.3vmin;
            height: 1.3vmin;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fbf1ff, #c69eff 48%, #6f4ddd 100%);
            box-shadow: 0 0 1.35vmin rgba(180, 110, 255, 0.24);
        }

        .bud::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(to top, rgba(255,255,255,0.4), transparent 55%);
            opacity: 0.45;
        }

        .bud.cluster {
            width: 1.1vmin;
            height: 1.1vmin;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #faf0ff, #c49eff 48%, #6f4ddd 100%);
            box-shadow: 0 0 1.4vmin rgba(175, 110, 255, 0.22);
        }

        .flower-top {
            position: absolute;
            left: 50%;
            top: -1.6vmin;
            transform: translateX(-50%);
            width: 5.5vmin;
            height: 5.5vmin;
            border-radius: 50%;
            background: radial-gradient(circle, #fff8ff 0 16%, #e3d7ff 20%, #b088ff 38%, #7a52df 68%, #5630b2 100%);
            box-shadow: 0 0 3vmin rgba(166, 122, 255, 0.55);
        }

        .leaf {
            position: absolute;
            width: 9vmin;
            height: 5vmin;
            bottom: 20vmin;
            border-radius: 0 100% 0 100%;
            background: linear-gradient(to top, rgba(40, 92, 53, 0.2), rgba(99, 163, 111, 0.95));
            filter: saturate(1.05);
            opacity: 0.95;
        }

        .leaf.left { left: -1.5vmin; transform: rotate(28deg); }
        .leaf.right { right: -1.5vmin; transform: rotate(-28deg) scaleX(-1); }

        .bush {
            position: absolute;
            bottom: 4vmin;
            left: 50%;
            transform: translateX(-50%);
            width: min(100%, 1100px);
            height: 34vmin;
            pointer-events: none;
        }


        .grass {
            position: absolute;
            bottom: 0;
            width: 18vmin;
            height: 42vmin;
            border-top-left-radius: 100%;
            border-left: 1.8vmin solid #2ca43a;
            transform-origin: bottom center;
            -webkit-mask-image: linear-gradient(to top, transparent 20%, #09111d);
            mask-image: linear-gradient(to top, transparent 20%, #09111d);
            opacity: 0.9;
            animation: grass-sway 4.2s ease-in-out infinite;
        }

        .grass.g1 { left: 5%; }
        .grass.g2 { left: 18%; transform: scale(0.9) rotate(4deg); }
        .grass.g3 { left: 33%; transform: scale(1.05) rotate(-2deg); }
        .grass.g4 { left: 64%; transform: scale(0.95) rotate(3deg); }
        .grass.g5 { left: 80%; transform: scale(1.02) rotate(-1deg); }
        .grass.g6 { left: 12%; transform: scale(0.92) rotate(4deg); }
        .grass.g7 { left: 50%; transform: scale(0.98) rotate(-2deg); }
        .grass.g8 { left: 92%; transform: scale(0.9) rotate(3deg); }

        .caption {
            position: fixed;
            left: 50%;
            bottom: max(1rem, env(safe-area-inset-bottom));
            transform: translateX(-50%);
            z-index: 20;
            color: rgba(245, 238, 255, 0.82);
            font-size: 0.95rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            text-align: center;
            text-shadow: 0 0 24px rgba(166, 122, 255, 0.25);
        }

        .return-link {
            position: fixed;
            top: max(1rem, env(safe-area-inset-top));
            left: max(1rem, env(safe-area-inset-left));
            z-index: 20;
            padding: 0.75rem 1rem;
            border-radius: 999px;
            text-decoration: none;
            color: #f7f2ff;
            background: rgba(20, 20, 36, 0.72);
            border: 1px solid rgba(214, 194, 255, 0.26);
            backdrop-filter: blur(14px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.32);
        }

        .not-loaded * {
            animation-play-state: paused !important;
        }

        @keyframes grow {
            from {
                transform: translateX(-50%) scaleY(0);
            }
        }

        @keyframes bloom {
            from {
                transform: translateX(-50%) scale(0);
                opacity: 0;
            }
        }

        @keyframes bloomGlow {
            0%, 100% {
                transform: translate(-50%, -35%) scale(0.92);
                opacity: 0.65;
            }
            50% {
                transform: translate(-50%, -35%) scale(1.1);
                opacity: 1;
            }
        }

        @keyframes sway {
            0%, 100% { transform: translateX(0) rotate(var(--sway, 0deg)); }
            50% { transform: translateX(0.6vmin) rotate(calc(var(--sway, 0deg) + 1.5deg)); }
        }

        @keyframes grass-sway {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(2deg); }
        }

        @keyframes firefly-glow {
            0%, 100% {
                opacity: 0;
            }
            35%, 65% {
                opacity: 0.92;
            }
            50% {
                opacity: 0.68;
            }
        }

        @keyframes firefly-drift {
            0%, 100% {
                transform: translate(-50%, -50%) translateX(0) translateY(0) scale(0.9);
            }
            25% {
                transform: translate(-50%, -50%) translateX(calc(var(--dx, 2vmin))) translateY(calc(var(--dy, -1.8vmin))) scale(1);
            }
            50% {
                transform: translate(-50%, -50%) translateX(calc(var(--dx, -1.5vmin))) translateY(calc(var(--dy, 1.6vmin))) scale(0.95);
            }
            75% {
                transform: translate(-50%, -50%) translateX(calc(var(--dx, 1vmin))) translateY(calc(var(--dy, 1.2vmin))) scale(1.02);
            }
        }

        @media (max-width: 700px) {
            .scene {
                transform: scale(0.84);
            }

            .sprig--1 { left: 3%; }
            .sprig--6 { left: 88%; }

            .caption {
                font-size: 0.75rem;
                letter-spacing: 0.09em;
            }
        }
    </style>
</head>
